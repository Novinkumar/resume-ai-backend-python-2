services:
  # Web Service
  - type: web
    name: resume-analyzer-api
    env: docker
    region: oregon
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true